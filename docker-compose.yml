services:
  ipfs:
    image: ipfs/kubo:latest
    container_name: folder-storage-ipfs
    ports:
      - "5001:5001" # IPFS HTTP API
      - "18080:8080" # IPFS Gateway (host 18080 to avoid conflicts)
    volumes:
      - ipfs_staging:/export
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ipfs_staging:
  ipfs_data:

